name: tests

# 每次 push / PR 自動跑全套測試 —— 引擎或規格被改壞時當場紅燈,擋在 merge 前。
# 另有每週排程的 network smoke(見 network-smoke job):非阻塞,只給線上半邊訊號(#62)。
on:
  push:
  pull_request:
  workflow_dispatch:          # 手動也能點一次 network smoke
  schedule:
    - cron: "17 3 * * 1"      # 每週一 03:17 UTC:離線套件照跑 + network smoke 補線上訊號

# 同一 ref 連續推送只保留最新一次 run,省 CI 額度。
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # 引擎執行期需要 pandas(dim_alpha_beta)與 rich(卡片渲染)——state-loop 測試經
      # subprocess 跑完整 main()→render()。但刻意【不】裝 yfinance,讓 fetch_prices() 走
      # 「未安裝→不連網」降級 → CI 維持離線、確定性(不抓即時股價、不 flaky),順便驗證優雅降級。
      - name: Install runtime deps (offline by design — no yfinance)
        run: python3 -m pip install pandas rich
      - name: Run full test suite (offline, deterministic)
        run: python3 tests/run_all.py

  # 線上半邊的訊號源(#62):裝 yfinance、設 TR_TEST_NETWORK=1 跑全套(含 β 方向 network smoke)。
  # 非阻塞:只在排程/手動觸發跑,紅了不擋任何 merge —— 行情/yfinance 抖動不該綁架 PR,
  # 但「線上半邊完全沒訊號」也不行(SELL_EARLY_TH 類突變曾三套全綠存活)。
  network-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps (with yfinance — online on purpose)
        run: python3 -m pip install pandas rich yfinance
      - name: Run full suite + network smoke (non-blocking)
        run: TR_TEST_NETWORK=1 python3 tests/run_all.py
